#
# General
#

set -g default-shell /usr/bin/zsh
set -g escape-time 0
set -g history-limit 1000000
set -g mode-keys vi
set -g prefix C-a

bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

#
# Theme
#

# Copy this to your tmux.conf
set -g status-style "bg=#1b1320,fg=#f0e4f2"
set -g status-left "#[bg=#1b1320]#[fg=#f0e4f2] #S "
set -g status-left-length 100
set -g status-right "#[bg=#1b1320]#[fg=#f0e4f2] #(date) "
setw -g window-status-style fg="#f0e4f2",bg="#1b1320"
setw -g window-status-current-style fg="#8b8291",bg="#3b2649"
setw -g window-status-format " #I #W "
setw -g window-status-current-format " #I #W "
setw -g window-status-separator ""
