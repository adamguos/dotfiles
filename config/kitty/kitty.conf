# Put the following lines in your ~/.config/kitty/kitty.conf
foreground #cecece
background #161616
color0 #8f8f8f
color1 #ed756e
color2 #5bb661
color3 #c39900
color4 #3ba6f5
color5 #968ff7
color6 #00baaa
color7 #cecece
color8 #8f8f8f
color9 #ff9890
color10 #7bd77f
color11 #e3b831
color12 #6fc6ff
color13 #b5b2ff
color14 #00dcca
color15 #dedede
cursor #cecece
cursor_text_color #161616
selection_foreground none
selection_background #262626
tab_bar_background #0c0c0c
active_tab_foreground #cecece
active_tab_background #161616
inactive_tab_foreground #484848
inactive_tab_background #101010
active_border_color #cecece
inactive_border_color #484848
font_size               13.0
hide_window_decorations no
modify_font cell_width  100%
placement_strategy      bottom

# BEGIN_KITTY_FONTS
font_family      family="Google Sans Code"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
