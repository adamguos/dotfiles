# Put the following lines in your ~/.config/kitty/kitty.conf
foreground #cccccc
background #101010
color0 #767676
color1 #af5f5f
color2 #5faf5f
color3 #af875f
color4 #5f87af
color5 #af87af
color6 #5f8787
color7 #9e9e9e
color8 #767676
color9 #d75f87
color10 #87d787
color11 #d7af87
color12 #5fafd7
color13 #d787d7
color14 #87afaf
color15 #c7c7c7
cursor #dadada
cursor_text_color #000000
selection_foreground #000000
selection_background #cccccc
tab_bar_background #080808
active_tab_foreground #cccccc
active_tab_background #101010
inactive_tab_foreground #3a3a3a
inactive_tab_background #0c0c0c
active_border_color #080808
inactive_border_color #767676

font_size               12.5
hide_window_decorations no
modify_font cell_width  100%
placement_strategy      bottom

# BEGIN_KITTY_FONTS
font_family      family="Geist Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
