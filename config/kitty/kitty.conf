# Put the following lines in your ~/.config/kitty/kitty.conf
foreground #f7eff0
background #121010
color0 #796769
color1 #fca2ae
color2 #e15774
color3 #bc969a
color4 #714e75
color5 #6c494d
color6 #e9bfc4
color7 #f9f1f2
color8 #796769
color9 #dd5571
color10 #d19299
color11 #dfb8bc
color12 #b96a76
color13 #473234
color14 #ab9295
color15 #f9f2f3
cursor #714e75
cursor_text_color #201c1c
selection_foreground none
selection_background #391418
tab_bar_background #090808
active_tab_foreground #f7eff0
active_tab_background #121010
inactive_tab_foreground #9a666d
inactive_tab_background #0d0c0c
