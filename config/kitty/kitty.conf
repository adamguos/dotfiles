# Put the following lines in your ~/.config/kitty/kitty.conf
foreground #ffffca
background #111307
color0 #5d6f74
color1 #cd6d91
color2 #947fbc
color3 #8d9a59
color4 #655a7c
color5 #5e4531
color6 #71d17c
color7 #e0ec7a
color8 #5d6f74
color9 #bc5050
color10 #4eae6e
color11 #bbc373
color12 #40719c
color13 #3c2e1a
color14 #809d7b
color15 #dad36d
cursor #655a7c
cursor_text_color #262904
selection_foreground none
selection_background #133a17
tab_bar_background #090a03
active_tab_foreground #ffffca
active_tab_background #111307
inactive_tab_foreground #6e9a66
inactive_tab_background #0c0e05
