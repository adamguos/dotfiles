# Put the following lines in your ~/.config/kitty/kitty.conf
foreground #f7f4e9
background #0d0d1a
color0 #5e5d79
color1 #ff7979
color2 #53d390
color3 #f0e68c
color4 #81c0ff
color5 #c695ff
color6 #68c0b6
color7 #dddbd5
color8 #5e5d79
color9 #ffa0a0
color10 #96ea7f
color11 #f8b471
color12 #87ceeb
color13 #d2adff
color14 #8fd1c7
color15 #fff9f2
cursor #f0e68c
cursor_text_color #0d0d1a
selection_foreground none
selection_background #3e2f4a
tab_bar_background #07070e
active_tab_foreground #f7f4e9
active_tab_background #0d0d1a
inactive_tab_foreground #757995
inactive_tab_background #090913
active_border_color #0d0d1a
inactive_border_color #ff7979

font_size               13.0
hide_window_decorations no
modify_font cell_width  100%
placement_strategy      bottom

# BEGIN_KITTY_FONTS
font_family      family="JuliaMono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
