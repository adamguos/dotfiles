# Put the following lines in your ~/.config/kitty/kitty.conf
foreground #f7eae5
background #1a0500
color0 #9a6f66
color1 #ff7979
color2 #7fcf78
color3 #f0e68c
color4 #81c0ff
color5 #c695ff
color6 #68c0b6
color7 #fff7d7
color8 #9a6f66
color9 #ffa0a0
color10 #a3e39a
color11 #f8b471
color12 #87ceeb
color13 #d2adff
color14 #8fd1c7
color15 #f7f4e9
cursor #f0e68c
cursor_text_color #1a0500
selection_foreground none
selection_background #5a3824
tab_bar_background #0e0200
active_tab_foreground #f7eae5
active_tab_background #1a0500
inactive_tab_foreground #b08a80
inactive_tab_background #130300
active_border_color #1a0500
inactive_border_color #c96e4d

font_size               13
hide_window_decorations no
modify_font cell_width  100%
placement_strategy      bottom

# BEGIN_KITTY_FONTS
font_family      family="Geist Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
