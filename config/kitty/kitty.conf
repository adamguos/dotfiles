# Put the following lines in your ~/.config/kitty/kitty.conf
foreground #cc9944
background #0f0c08
color0 #0f0c08
color1 #cc9944
color2 #cc9944
color3 #cc9944
color4 #cc9944
color5 #cc9944
color6 #cc9944
color7 #cc9944
color8 #382818
color9 #ffbb55
color10 #ffbb55
color11 #cc9944
color12 #cc9944
color13 #cc9944
color14 #cc9944
color15 #ffbb55
cursor #ffbb55
cursor_text_color #0f0c08
selection_foreground none
selection_background #2a1c10
tab_bar_background #080604
active_tab_foreground #cc9944
active_tab_background #0f0c08
inactive_tab_foreground #382818
inactive_tab_background #0b0906
active_border_color #cc9944
inactive_border_color #3a2810

font_size               13.0
hide_window_decorations no
modify_font cell_width  100%
placement_strategy      bottom

# BEGIN_KITTY_FONTS
font_family      family="Iosevka Slab"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
