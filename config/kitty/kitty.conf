inactive_border_color #201c1c

font_size               13.0
hide_window_decorations no
modify_font cell_width  100%
placement_strategy      bottom

# BEGIN_KITTY_FONTS
font_family      family="Iosevka Slab"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
