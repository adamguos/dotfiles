# Put the following lines in your ~/.config/kitty/kitty.conf
foreground #fbfcf6
background #171a15
color0 #1d211a
color1 #ea938b
color2 #bccd80
color3 #f7c775
color4 #90dde4
color5 #dac3ed
color6 #a5d6cb
color7 #fbfcf6
color8 #99a293
color9 #ea938b
color10 #ecf6ae
color11 #fbe09f
color12 #90dde4
color13 #dac3ed
color14 #a5d6cb
color15 #fbfcf7
cursor #fbfcf7
cursor_text_color #171a15
selection_foreground none
selection_background #363c34
tab_bar_background #0c0e0b
active_tab_foreground #fbfcf6
active_tab_background #171a15
inactive_tab_foreground #c0c7b7
inactive_tab_background #11130f
active_border_color #fbfcf6
inactive_border_color #858d80

font_size               13.0
hide_window_decorations no
modify_font cell_width  100%
placement_strategy      bottom

# BEGIN_KITTY_FONTS
font_family      family="Google Sans Code"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
