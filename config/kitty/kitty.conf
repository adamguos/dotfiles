# Put the following lines in your ~/.config/kitty/kitty.conf
foreground #f0ebe6
background #000000
color0 #605c4d
color1 #ff7979
color2 #7fcf78
color3 #f0e68c
color4 #81c0ff
color5 #c695ff
color6 #68c0b6
color7 #fff7d7
color8 #605c4d
color9 #ffa0a0
color10 #a3e39a
color11 #f8b471
color12 #87ceeb
color13 #d2adff
color14 #8fd1c7
color15 #f7f4e9
cursor #f0e68c
cursor_text_color #000000
selection_foreground none
selection_background #532e2e
tab_bar_background #000000
active_tab_foreground #f0ebe6
active_tab_background #000000
inactive_tab_foreground #7a7662
inactive_tab_background #000000
active_border_color #000000
inactive_border_color #bdb76b

font_size               13.0
hide_window_decorations no
modify_font cell_width  100%
placement_strategy      bottom

# BEGIN_KITTY_FONTS
font_family      family="Iosevka Term Curly Slab"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
