# Put the following lines in your ~/.config/kitty/kitty.conf
foreground #f0e4f2
background #1b1320
color0 #71609a
color1 #ff7979
color2 #7fcf78
color3 #f0e68c
color4 #81c0ff
color5 #c695ff
color6 #68c0b6
color7 #fff7d7
color8 #71609a
color9 #ffa0a0
color10 #a3e39a
color11 #f8b471
color12 #87ceeb
color13 #d2adff
color14 #8fd1c7
color15 #f7f4e9
cursor #f0e68c
cursor_text_color #1b1320
selection_foreground none
selection_background #362343
tab_bar_background #0e0a11
active_tab_foreground #f0e4f2
active_tab_background #1b1320
inactive_tab_foreground #8b80aa
inactive_tab_background #140e18
active_border_color #1b1320
inactive_border_color #f7997d

font_size               12.5
hide_window_decorations no
modify_font cell_width  100%
placement_strategy      bottom

# BEGIN_KITTY_FONTS
font_family      family="Geist Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
